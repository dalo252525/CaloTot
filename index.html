<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#070d1a;min-height:100vh;overscroll-behavior:none;}
body{color:#e2e8f0;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;}
#app{max-width:390px;margin:0 auto;}
button,input,textarea{font-family:"DM Sans",sans-serif;}
button{cursor:pointer;}
textarea:focus,input:focus{outline:none;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:none;}}
.page{padding:14px 16px 80px;animation:fi .22s ease both;}
.card{background:#0d1525;border:1px solid #1a2540;border-radius:14px;padding:14px;margin-bottom:12px;}
.card-list{background:#0d1525;border:1px solid #1a2540;border-radius:10px;overflow:hidden;margin-bottom:10px;}
.card-empty{background:#0d1525;border:1px dashed #1a2540;border-radius:10px;padding:8px;text-align:center;color:#1e3a5f;font-size:11px;margin-bottom:10px;}
.ib{background:#0d1525;border:1px solid #1a2540;border-radius:8px;padding:6px 8px;color:#64748b;font-size:15px;}
.ab{background:#0d1525;border:1px solid #1a2540;border-radius:7px;padding:4px 11px;color:#64748b;font-size:17px;line-height:1.4;}

  card.innerHTML='<div style="font-size:12px;font-weight:700;color:#94a3b8;font-family:Syne,sans-serif;margin-bottom:3px;">🔥 Calorie giornaliere</div><div style="font-size:11px;color:#475569;margin-bottom:12px;">I macros vengono calcolati automaticamente</div>';
  var inp=mk('input');inp.type='number';inp.min='800';inp.max='5000';inp.step='50';inp.value=String(G.kcal);
  inp.style.cssText='width:100%;background:#070d1a;border:1.5px solid #334155;border-radius:10px;padding:12px;color:#f8fafc;font-size:24px;font-weight:800;font-family:Syne,sans-serif;text-align:center;margin-bottom:10px;';
  var prev=mk('div');prev.style.cssText='background:#070d1a;border-radius:10px;padding:10px 12px;';
  function up(k2){
    var k=parseInt(k2)||0;
    if(k<800||k>5000){prev.innerHTML='<div style="color:#f87171;font-size:11px;text-align:center;">Valore tra 800 e 5000</div>';return null;}
    var mc=cm(k);
    prev.innerHTML='<div style="font-size:10px;color:#475569;margin-bottom:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;">Macros calcolati</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;text-align:center;"><div><div style="font-size:16px;font-weight:800;font-family:Syne,sans-serif;color:#60a5fa;">'+mc.protein+'g</div><div style="font-size:9px;color:#475569;">Proteine</div></div><div><div style="font-size:16px;font-weight:800;font-family:Syne,sans-serif;color:#f59e0b;">'+mc.carbs+'g</div><div style="font-size:9px;color:#475569;">Carb</div></div><div><div style="font-size:16px;font-weight:800;font-family:Syne,sans-serif;color:#a78bfa;">'+mc.fat+'g</div><div style="font-size:9px;color:#475569;">Grassi</div></div><div><div style="font-size:16px;font-weight:800;font-family:Syne,sans-serif;color:#34d399;">'+mc.fiber+'g</div><div style="font-size:9px;color:#475569;">Fibre</div></div></div>';
    return mc;
  }
  up(G.kcal);inp.oninput=function(){up(inp.value);};
  card.appendChild(inp);card.appendChild(prev);pg.appendChild(card);
  var sb=mk('button');sb.className='pb';sb.style.marginBottom='12px';sb.textContent='💾 Salva obiettivi';
  sb.onclick=function(){
    var k=parseInt(inp.value)||0,mc=up(k);
    if(!mc){toast('Valore non valido','#ef4444');return;}
    S.goals=mc;ls('nj_goals',mc);toast('✓ Salvato');go('j');
  };
  pg.appendChild(sb);
  var cur=mk('div');cur.className='card';cur.style.fontSize='12px';cur.style.color='#475569';
  cur.innerHTML='<div style="font-weight:700;color:#64748b;margin-bottom:3px;">Obiettivi attuali</div>'+G.kcal+' kcal · '+G.protein+'g P · '+G.carbs+'g C · '+G.fat+'g G · '+G.fiber+'g F';
  pg.appendChild(cur);
  return pg;
}

function cG(input,onOk,onErr){
  var prompt='Sei un nutrizionista. L\'utente ha mangiato: "'+input+'".\\nRispondi SOLO con JSON valido senza markdown:\\n{"items":[{"name":"nome con quantita","kcal":0,"protein":0,"carbs":0,"fat":0,"fiber":0}]}\\nUn item per alimento. Stima quantita standard italiane se non specificate.';
  fetch(GU,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.1}})})
  .then(function(r){if(!r.ok)throw new Error('Errore '+r.status+'. Riprova tra qualche secondo.');return r.json();})
  .then(function(data){
    var parts=(((data.candidates||[])[0]||{}).content||{}).parts||[];
    var text=parts[0]&&parts[0].text?parts[0].text:'';
    var parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    onOk(parsed.items.map(function(it){return{name:it.name,kcal:Math.round(it.kcal||0),protein:Math.round((it.protein||0)*10)/10,carbs:Math.round((it.carbs||0)*10)/10,fat:Math.round((it.fat||0)*10)/10,fiber:Math.round((it.fiber||0)*10)/10};}));
  })
  .catch(function(e){onErr(e.message||'Errore. Riprova.');});
}

function sd(d){var dt=new Date(S.date+'T12:00:00');dt.setDate(dt.getDate()+d);S.date=dt.toISOString().split('T')[0];render();}
function ri(meal,idx){var days=JSON.parse(JSON.stringify(S.days));days[S.date].meals[meal].splice(idx,1);S.days=days;ls('nj_days',days);toast('Rimosso');render();}
function eC(){
  var rows=[['Data','Pasto','Alimento','Kcal','Proteine(g)','Carb(g)','Grassi(g)','Fibre(g)']];
  Object.keys(S.days).sort().forEach(function(dt){ML.forEach(function(m){((S.days[dt].meals||{})[m]||[]).forEach(function(it){rows.push([dt,m,it.name,it.kcal,it.protein,it.carbs,it.fat,it.fiber]);});});});
  var csv=rows.map(function(r){return r.map(function(v){return'"'+String(v||'').replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var url=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  var a=document.createElement('a');a.href=url;a.download='diario_'+td()+'.csv';a.click();URL.revokeObjectURL(url);
}
function eJ(){
  var url=URL.createObjectURL(new Blob([JSON.stringify({goals:S.goals,days:S.days},null,2)],{type:'application/json'}));
  var a=document.createElement('a');a.href=url;a.download='diario_'+td()+'.json';a.click();URL.revokeObjectURL(url);
}
function go(v){S.v=v;render();}
function render(){
  var app=document.getElementById('app');app.innerHTML='';
  var views={j:vJ,a:vA,c:vC,s:vS};
  app.appendChild((views[S.v]||vJ)());
}
S.days=lg('nj_days',{});S.goals=lg('nj_goals',DG);
render();

</script>
