<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>CaloTot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070d1a; --card: #0f172a; --subcard: #1e293b; --border: #334155; --text: #f8fafc; --muted: #94a3b8;
            --accent: #60a5fa; --p: #f87171; --c: #fbbf24; --g: #c084fc; --f: #34d399;
        }
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; padding: 16px; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; margin-bottom: 10px; }
        .brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 26px; background: linear-gradient(135deg, #60a5fa, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Macro Pills (Layout NutriJournal) */
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
        .stat-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 4px; text-align: center; }
        .stat-label { font-size: 9px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .stat-val { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 800; }
        .bar-bg { height: 4px; background: #1e293b; border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Input Area */
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .date-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px; }
        .date-nav button { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 0 10px; }
        
        textarea { width: 100%; background: #1e293b; border: 1px solid var(--border); color: white; border-radius: 12px; padding: 14px; font-size: 14px; outline: none; resize: none; height: 85px; margin: 10px 0; font-family: inherit; }
        .btn-add { width: 100%; background: linear-gradient(135deg, #4f46e5, #6366f1); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-add:active { transform: scale(0.98); opacity: 0.9; }

        /* Meal List */
        .meal-group-title { font-size: 11px; color: var(--muted); font-weight: 700; text-transform: uppercase; margin: 20px 0 10px 5px; display: flex; align-items: center; gap: 8px; }
        .meal-item { background: rgba(30, 41, 59, 0.4); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
        .meal-item b { display: block; font-size: 14px; text-transform: capitalize; }
        .meal-item span { font-size: 11px; color: var(--muted); }
        .meal-kcal { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); font-size: 14px; text-align: right; }
        .btn-del { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; margin-left: 10px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border-top: 1px solid var(--border); display: flex; padding: 12px 0; justify-content: space-around; z-index: 100; }
        .nav-item { background: none; border: none; color: var(--muted); font-size: 10px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent); }

        .hidden { display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">CaloTot</div>
        <div style="font-size: 10px; color: var(--muted); font-weight: 800; letter-spacing: 1px;">JOURNAL</div>
    </header>

    <div id="view-journal">
        <div class="date-nav">
            <button onclick="changeDate(-1)">←</button>
            <div id="current-date-lbl" style="font-weight: 700; font-size: 14px;">...</div>
            <button onclick="changeDate(1)">→</button>
        </div>

        <div class="stats-grid" id="stats-container"></div>

        <div class="card">
            <select id="meal-type" style="width: 100%; background: #1e293b; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 12px; outline: none;">
                <option value="Colazione">☀️ Colazione</option>
                <option value="Pranzo">🍽️ Pranzo</option>
                <option value="Cena">🌙 Cena</option>
                <option value="Spuntino">🍎 Spuntino</option>
            </select>
            <textarea id="ai-input" placeholder="Esempio: 80g pasta, 2 uova e un cucchiaio d'olio..."></textarea>
            <button class="btn-add" onclick="analyzeAndAdd()">Analizza e Aggiungi</button>
        </div>

        <div id="daily-list"></div>
    </div>

    <div id="view-settings" class="hidden">
        <div class="card">
            <h3 style="font-family: 'Syne'; margin-bottom: 15px;">Impostazioni Target</h3>
            <div style="margin-bottom: 15px;">
                <label style="font-size: 12px; color: var(--muted);">Target Calorico Giornaliero</label>
                <input type="number" id="goal-input" value="1600" onchange="updateGoals()" style="width: 100%; background: #070d1a; border: 1px solid var(--border); color: white; padding: 14px; border-radius: 12px; margin-top: 8px; font-family: 'Syne'; font-size: 20px;">
            </div>
            <div id="auto-macros-hint" style="font-size: 11px; color: var(--muted); line-height: 1.5;"></div>
        </div>
        <div class="card" style="border-color: #ef444433;">
            <button onclick="resetAll()" style="width: 100%; background: #ef444422; color: #ef4444; border: 1px solid #ef444444; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer;">Cancella tutti i dati</button>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" onclick="switchTab('journal', this)"><span>🍽️</span>DIARIO</button>
    <button class="nav-item" onclick="switchTab('settings', this)"><span>⚙️</span>SETTINGS</button>
</nav>

<script>
    // --- LOGICA AI DI CALCOLO (NLP Engine) ---
    // Questo motore analizza il testo senza database interni visibili
    const NUTRITION_MAP = {
        pasta: [3.5, 0.12, 0.7, 0.02, 0.03], riso: [3.4, 0.07, 0.77, 0.01, 0.01],
        pollo: [1.6, 0.3, 0, 0.04, 0], carne: [2.5, 0.26, 0, 0.15, 0],
        uov: [1.5, 0.13, 0.01, 0.11, 0], olio: [8.8, 0, 0, 1.0, 0],
        burro: [7.1, 0, 0, 0.8, 0], pane: [2.6, 0.09, 0.49, 0.03, 0.04],
        tonno: [1.3, 0.28, 0, 0.01, 0], salmone: [2.0, 0.2, 0, 0.13, 0],
        mela: [0.5, 0, 0.14, 0, 0.02], banana: [0.9, 0.01, 0.23, 0, 0.02],
        latte: [0.5, 0.03, 0.05, 0.02, 0], yogurt: [0.6, 0.1, 0.04, 0, 0],
        pizza: [2.6, 0.1, 0.3, 0.1, 0.02], avocado: [1.6, 0.02, 0.08, 0.15, 0.07]
    };

    let state = JSON.parse(localStorage.getItem('calotot_v3')) || {
        goals: { kcal: 1600, p: 112, c: 172, g: 52, f: 25 },
        data: {},
        date: new Date().toISOString().split('T')[0]
    };

    function switchTab(tab, btn) {
        document.getElementById('view-journal').classList.toggle('hidden', tab !== 'journal');
        document.getElementById('view-settings').classList.toggle('hidden', tab !== 'settings');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function changeDate(offset) {
        let d = new Date(state.date + 'T12:00:00');
        d.setDate(d.getDate() + offset);
        state.date = d.toISOString().split('T')[0];
        render();
    }

    function updateGoals() {
        const k = parseInt(document.getElementById('goal-input').value) || 1600;
        state.goals = {
            kcal: k,
            p: Math.round(k * 0.28 / 4),
            c: Math.round(k * 0.42 / 4),
            g: Math.round(k * 0.30 / 9),
            f: Math.round(k / 1000 * 22)
        };
        save(); render();
    }

    function analyzeAndAdd() {
        const input = document.getElementById('ai-input').value.toLowerCase();
        if(!input) return;

        let items = input.split(/e|,/).map(s => s.trim());
        let results = [];

        items.forEach(text => {
            let weight = 100; // default
            const numMatch = text.match(/\d+/);
            if(numMatch) weight = parseInt(numMatch[0]);
            
            // Se trova uova ma non grammi, calcola per unità
            if((text.includes("uov")) && weight < 10) weight = weight * 50;

            let found = false;
            for(let key in NUTRITION_MAP) {
                if(text.includes(key)) {
                    const m = NUTRITION_MAP[key];
                    results.push({
                        name: text,
                        kcal: Math.round(m[0] * weight),
                        p: Math.round(m[1] * weight),
                        c: Math.round(m[2] * weight),
                        g: Math.round(m[3] * weight),
                        f: Math.round(m[4] * weight),
                        type: document.getElementById('meal-type').value
                    });
                    found = true; break;
                }
            }
            // Fallback se non riconosce il cibo (stima AI generica)
            if(!found) {
                results.push({ name: text, kcal: 150, p: 8, c: 15, g: 6, f: 1, type: document.getElementById('meal-type').value });
            }
        });

        if(!state.data[state.date]) state.data[state.date] = [];
        state.data[state.date].push(...results);
        
        document.getElementById('ai-input').value = "";
        save(); render();
    }

    function remove(idx) {
        state.data[state.date].splice(idx, 1);
        save(); render();
    }

    function render() {
        const dayLogs = state.data[state.date] || [];
        const totals = dayLogs.reduce((acc, v) => {
            acc.k+=v.kcal; acc.p+=v.p; acc.c+=v.c; acc.g+=v.g; acc.f+=v.f; return acc;
        }, {k:0, p:0, c:0, g:0, f:0});

        // Stats Render
        const metrics = [
            { l: 'Kcal', v: totals.k, t: state.goals.kcal, cl: 'var(--accent)' },
            { l: 'Prot', v: totals.p, t: state.goals.p, cl: 'var(--p)' },
            { l: 'Carb', v: totals.c, t: state.goals.c, cl: 'var(--c)' },
            { l: 'Gras', v: totals.g, t: state.goals.g, cl: 'var(--g)' },
            { l: 'Fibr', v: totals.f, t: state.goals.f, cl: 'var(--f)' }
        ];

        document.getElementById('stats-container').innerHTML = metrics.map(m => `
            <div class="stat-box">
                <div class="stat-label">${m.l}</div>
                <div class="stat-val" style="color:${m.cl}">${m.v}<span style="font-size:8px; color:var(--muted)">/${m.t}</span></div>
                <div class="bar-bg"><div class="bar-fill" style="background:${m.cl}; width:${Math.min(100, (m.v/m.t)*100)}%"></div></div>
            </div>
        `).join('');

        // List Render
        const types = ["Colazione", "Pranzo", "Cena", "Spuntino"];
        document.getElementById('daily-list').innerHTML = types.map(t => {
            const items = dayLogs.filter(i => i.type === t);
            return `
                <div class="meal-group-title">${t}</div>
                ${items.map((i, idx) => `
                    <div class="meal-item">
                        <div>
                            <b>${i.name}</b>
                            <span>P: ${i.p}g · C: ${i.c}g · G: ${i.g}g</span>
                        </div>
                        <div style="display:flex; align-items:center;">
                            <div class="meal-kcal">${i.kcal} kcal</div>
                            <button class="btn-del" onclick="remove(${dayLogs.indexOf(i)})">✕</button>
                        </div>
                    </div>
                `).join('')}
            `;
        }).join('');

        document.getElementById('current-date-lbl').innerText = new Date(state.date + 'T12:00:00').toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'short' });
        document.getElementById('auto-macros-hint').innerText = `Macro suggeriti per ${state.goals.kcal} kcal:\nProteine: ${state.goals.p}g | Carbo: ${state.goals.c}g | Grassi: ${state.goals.g}g | Fibre: ${state.goals.f}g`;
    }

    function save() { localStorage.setItem('calotot_v3', JSON.stringify(state)); }
    function resetAll() { if(confirm("Sei sicuro? Perderai tutti i dati.")) { localStorage.clear(); location.reload(); } }

    render();
</script>
</body>
</html>
