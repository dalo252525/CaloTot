<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaloTot</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <div class="max-w-6xl mx-auto p-6">
    <header class="mb-6">
      <h1 class="text-3xl font-bold">CaloTot</h1>
      <p class="text-sm text-slate-600">Journal nutrizionale giornaliero</p>
    </header>

    <div class="grid md:grid-cols-3 gap-6">
      <section class="md:col-span-2 bg-white rounded-2xl shadow p-5">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-semibold">Oggi</h2>
          <input id="day" type="date" class="border rounded-lg px-3 py-2" />
        </div>

        <form id="mealForm" class="grid md:grid-cols-6 gap-3 mb-5">
          <input id="meal" placeholder="Pasto" class="border rounded-lg px-3 py-2" />
          <input id="food" placeholder="Cosa hai mangiato" class="border rounded-lg px-3 py-2 md:col-span-2" />
          <input id="cal" type="number" placeholder="kcal" class="border rounded-lg px-3 py-2" />
          <input id="protein" type="number" placeholder="Proteine" class="border rounded-lg px-3 py-2" />
          <input id="carbs" type="number" placeholder="Carboidrati" class="border rounded-lg px-3 py-2" />
          <input id="fat" type="number" placeholder="Grassi" class="border rounded-lg px-3 py-2" />
          <input id="fiber" type="number" placeholder="Fibre" class="border rounded-lg px-3 py-2" />
          <button class="bg-slate-900 text-white rounded-xl px-4 py-2">Aggiungi</button>
        </form>

        <div class="mb-5">
          <div class="flex gap-3">
            <input id="aiInput" placeholder="Es. 2 uova, 150g riso, 1 banana" class="border rounded-lg px-3 py-2 flex-1" />
            <button id="aiCalc" type="button" class="border rounded-xl px-4 py-2">Calcola con AI</button>
          </div>
          <p class="text-sm text-slate-500 mt-2">Stima automatica di calorie e macronutrienti.</p>
        </div>

        <div id="entries"></div>
      </section>

      <aside class="bg-white rounded-2xl shadow p-5">
        <h2 class="text-xl font-semibold mb-4">Riepilogo</h2>
        <div id="summary"></div>
      </aside>
    </div>

    <section class="bg-white rounded-2xl shadow p-5 mt-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Panoramica mensile</h2>
        <button id="exportBtn" class="border rounded-xl px-4 py-2">Esporta dati</button>
      </div>
      <div id="calendar"></div>
    </section>

    <section class="bg-white rounded-2xl shadow p-5 mt-6">
      <h2 class="text-xl font-semibold mb-4">Impostazioni</h2>
      <div class="flex gap-3 items-center">
        <label>Calorie giornaliere</label>
        <input id="targetCalories" type="number" class="border rounded-lg px-3 py-2" />
        <button id="saveSettings" class="bg-slate-900 text-white rounded-xl px-4 py-2">Salva</button>
      </div>
      <p class="text-sm text-slate-500 mt-3">I macronutrienti vengono calcolati automaticamente usando 30% proteine, 40% carboidrati, 30% grassi.</p>
    </section>
  </div>

  <script>
    const STORAGE = 'calotot-data';

    const defaultData = {
      settings: { calories: 1600 },
      entries: {}
    };

    let data = JSON.parse(localStorage.getItem(STORAGE) || 'null') || defaultData;

    const dayInput = document.getElementById('day');
    dayInput.valueAsDate = new Date();
    document.getElementById('targetCalories').value = data.settings.calories;

    function save() {
      localStorage.setItem(STORAGE, JSON.stringify(data));
    }

    function macrosTarget() {
      const c = data.settings.calories;
      return {
        protein: Math.round((c * 0.30) / 4),
        carbs: Math.round((c * 0.40) / 4),
        fat: Math.round((c * 0.30) / 9)
      };
    }

    function getEntries(date) {
      return data.entries[date] || [];
    }

    function render() {
      const date = dayInput.value;
      const entries = getEntries(date);

      document.getElementById('entries').innerHTML = entries.map(e => `
        <div class="border rounded-xl p-3 mb-2">
          <div class="font-medium">${e.meal} — ${e.food}</div>
          <div class="text-sm text-slate-600">${e.cal} kcal · P ${e.protein}g · C ${e.carbs}g · G ${e.fat}g · F ${e.fiber}g</div>
        </div>
      `).join('');

      const totals = entries.reduce((a, e) => ({
        cal: a.cal + Number(e.cal),
        protein: a.protein + Number(e.protein),
        carbs: a.carbs + Number(e.carbs),
        fat: a.fat + Number(e.fat),
        fiber: a.fiber + Number(e.fiber)
      }), { cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 });

      const target = macrosTarget();

      document.getElementById('summary').innerHTML = `
        <div class="space-y-2 text-sm">
          <div>Calorie: ${totals.cal} / ${data.settings.calories}</div>
          <div>Proteine: ${totals.protein}g / ${target.protein}g</div>
          <div>Carboidrati: ${totals.carbs}g / ${target.carbs}g</div>
          <div>Grassi: ${totals.fat}g / ${target.fat}g</div>
          <div>Fibre: ${totals.fiber}g</div>
        </div>
      `;

      renderCalendar();
    }

    function renderCalendar() {
      const keys = Object.keys(data.entries).sort();
      document.getElementById('calendar').innerHTML = keys.map(d => {
        const total = getEntries(d).reduce((a, e) => a + Number(e.cal), 0);
        return `<div class="border rounded-lg p-2 mb-2">${d} — ${total} kcal</div>`;
      }).join('') || '<p class="text-slate-500">Nessun dato ancora.</p>';
    }

    document.getElementById('mealForm').addEventListener('submit', e => {
      e.preventDefault();
      const date = dayInput.value;
      if (!data.entries[date]) data.entries[date] = [];

      data.entries[date].push({
        meal: meal.value,
        food: food.value,
        cal: cal.value || 0,
        protein: protein.value || 0,
        carbs: carbs.value || 0,
        fat: fat.value || 0,
        fiber: fiber.value || 0
      });

      e.target.reset();
      save();
      render();
    });

    document.getElementById('saveSettings').addEventListener('click', () => {
      data.settings.calories = Number(document.getElementById('targetCalories').value);
      save();
      render();
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'calotot-export.json';
      a.click();
    });

    function estimateNutrition(text) {
      const db = {
        uova: { cal: 78, protein: 6.3, carbs: 0.6, fat: 5.3, fiber: 0 },
        banana: { cal: 105, protein: 1.3, carbs: 27, fat: 0.4, fiber: 3.1 },
        riso: { cal: 130, protein: 2.7, carbs: 28, fat: 0.3, fiber: 0.4 }
      };

      const parts = text.toLowerCase().split(',');
      const total = { cal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };

      parts.forEach(part => {
        const qty = Number(part.match(/\d+/)?.[0] || 1);
        Object.keys(db).forEach(name => {
          if (part.includes(name)) {
            const factor = name === 'riso' ? qty / 100 : qty;
            total.cal += db[name].cal * factor;
            total.protein += db[name].protein * factor;
            total.carbs += db[name].carbs * factor;
            total.fat += db[name].fat * factor;
            total.fiber += db[name].fiber * factor;
          }
        });
      });

      return total;
    }

    document.getElementById('aiCalc').addEventListener('click', () => {
      const text = document.getElementById('aiInput').value;
      const result = estimateNutrition(text);
      cal.value = Math.round(result.cal);
      protein.value = Math.round(result.protein);
      carbs.value = Math.round(result.carbs);
      fat.value = Math.round(result.fat);
      fiber.value = Math.round(result.fiber);
      food.value = text;
    });

    dayInput.addEventListener('change', render);

    render();
  </script>
</body>
</html>
