<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CaloTot - AI NutriJournal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #070d1a;
            --card-bg: #0f172a;
            --accent: #6366f1;
            --text-muted: #94a3b8;
        }
        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .font-syne { font-family: 'Syne', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-tab.active { color: white; background: rgba(99, 102, 241, 0.2); border-bottom: 2px solid var(--accent); }
        .input-dark { background: #1e293b; border: 1px solid #334155; color: white; transition: all 0.2s; }
        .input-dark:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        
        /* Calendar Styling */
        .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.75rem; border-radius: 8px; }
        .cal-day.has-data { background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="safe-area-inset-bottom">

    <nav class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 px-6 py-3 flex justify-between items-center z-50">
        <button onclick="showTab('journal')" id="btn-journal" class="btn-tab px-4 py-2 rounded-lg text-sm font-semibold active">Diario</button>
        <button onclick="showTab('calendar')" id="btn-calendar" class="btn-tab px-4 py-2 rounded-lg text-sm font-semibold text-slate-400">Mese</button>
        <button onclick="showTab('settings')" id="btn-settings" class="btn-tab px-4 py-2 rounded-lg text-sm font-semibold text-slate-400">Setting</button>
    </nav>

    <main class="p-6 max-w-md mx-auto mb-24">
        
        <header class="mb-8">
            <h1 class="font-syne text-3xl mb-1 tracking-tighter italic">CALOTOT</h1>
            <p id="display-date" class="text-xs text-slate-500 uppercase tracking-widest font-bold">OGGI</p>
            
            <div class="grid grid-cols-4 gap-2 mt-6">
                <div class="glass p-3 rounded-2xl text-center">
                    <span id="stat-p" class="block font-syne text-blue-400 text-lg">0</span>
                    <span class="text-[9px] text-slate-500 uppercase">Prot</span>
                </div>
                <div class="glass p-3 rounded-2xl text-center">
                    <span id="stat-c" class="block font-syne text-amber-400 text-lg">0</span>
                    <span class="text-[9px] text-slate-500 uppercase">Carb</span>
                </div>
                <div class="glass p-3 rounded-2xl text-center">
                    <span id="stat-f" class="block font-syne text-purple-400 text-lg">0</span>
                    <span class="text-[9px] text-slate-500 uppercase">Fat</span>
                </div>
                <div class="glass p-3 rounded-2xl text-center">
                    <span id="stat-fi" class="block font-syne text-emerald-400 text-lg">0</span>
                    <span class="text-[9px] text-slate-500 uppercase">Fib</span>
                </div>
            </div>

            <div class="mt-4 glass p-4 rounded-2xl">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-xs text-slate-400 uppercase font-bold">Kcal Totali</span>
                    <span class="font-syne text-xl"><span id="stat-kcal">0</span> <span class="text-xs text-slate-500 italic">/ <span id="target-display">1600</span></span></span>
                </div>
                <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                    <div id="kcal-progress" class="bg-indigo-500 h-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <section id="tab-journal" class="space-y-6">
            <div class="glass p-5 rounded-3xl">
                <textarea id="ai-input" placeholder="Cosa hai mangiato? (es. 100g riso e tonno)" class="w-full bg-transparent border-none text-white placeholder-slate-600 resize-none focus:ring-0 text-lg"></textarea>
                <button onclick="analyzeFood()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 py-3 rounded-2xl font-bold transition-all transform active:scale-95 shadow-lg shadow-indigo-500/20">
                    Aggiungi Pasto AI
                </button>
            </div>

            <div id="meals-container" class="space-y-3">
                </div>
        </section>

        <section id="tab-calendar" class="hidden animate-in fade-in">
            <div class="glass p-5 rounded-3xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 id="cal-month-title" class="font-syne text-lg uppercase italic">Mese</h3>
                </div>
                <div class="grid grid-cols-7 gap-2 text-center text-[10px] text-slate-500 font-bold mb-4">
                    <span>LU</span><span>MA</span><span>ME</span><span>GI</span><span>VE</span><span>SA</span><span>DO</span>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-2"></div>
            </div>
            
            <button onclick="exportCSV()" class="w-full mt-6 border border-slate-700 text-slate-400 py-3 rounded-2xl text-sm font-bold">
                ESPORTA DATI (CSV)
            </button>
        </section>

        <section id="tab-settings" class="hidden space-y-6">
            <div class="glass p-6 rounded-3xl">
                <h3 class="font-syne text-lg mb-4 italic uppercase">Obiettivo Giornaliero</h3>
                <label class="text-[10px] text-slate-500 uppercase font-bold">Calorie Target</label>
                <input type="number" id="kcal-target-input" oninput="updateGoals()" class="w-full input-dark p-4 rounded-2xl text-2xl font-syne mb-4">
                <p class="text-[11px] text-slate-400 leading-relaxed italic">
                    * I macronutrienti vengono ricalcolati automaticamente basandosi su una ripartizione bilanciata (30% P, 40% C, 30% G).
                </p>
            </div>
            <button onclick="localStorage.clear(); location.reload();" class="w-full text-red-500/50 text-xs uppercase tracking-widest font-bold">Resetta tutti i dati</button>
        </section>

    </main>

    <script>
        // --- LOGICA E STATO ---
        let state = JSON.parse(localStorage.getItem('calotot_v1')) || {
            goals: { kcal: 1600, p: 120, c: 160, f: 53, fi: 25 },
            history: {} // Struttura: { "2023-10-27": [pasti] }
        };

        const today = new Date().toISOString().split('T')[0];

        function save() { localStorage.setItem('calotot_v1', JSON.stringify(state)); render(); }

        function updateGoals() {
            const k = parseInt(document.getElementById('kcal-target-input').value) || 1600;
            state.goals = {
                kcal: k,
                p: Math.round((k * 0.30) / 4),
                c: Math.round((k * 0.40) / 4),
                f: Math.round((k * 0.30) / 9),
                fi: Math.round((k / 1000) * 14)
            };
            save();
        }

        function analyzeFood() {
            const input = document.getElementById('ai-input');
            if(!input.value) return;

            // Simulazione AI (In un caso reale qui chiameresti GPT-4)
            const mockNames = ["Pollo e Riso", "Pasta al Pesto", "Omelette", "Yogurt e Noci"];
            const entry = {
                id: Date.now(),
                name: input.value.length > 25 ? input.value.substring(0, 25) + "..." : input.value,
                kcal: Math.floor(Math.random() * 400) + 200,
                p: Math.floor(Math.random() * 25) + 5,
                c: Math.floor(Math.random() * 40) + 10,
                f: Math.floor(Math.random() * 15) + 5,
                fi: Math.floor(Math.random() * 6),
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            };

            if(!state.history[today]) state.history[today] = [];
            state.history[today].push(entry);
            input.value = "";
            save();
        }

        function deleteMeal(id) {
            state.history[today] = state.history[today].filter(m => m.id !== id);
            save();
        }

        // --- UI RENDERING ---
        function showTab(tab) {
            ['journal', 'calendar', 'settings'].forEach(t => {
                document.getElementById('tab-' + t).classList.add('hidden');
                document.getElementById('btn-' + t).classList.remove('active', 'text-white');
                document.getElementById('btn-' + t).classList.add('text-slate-400');
            });
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active', 'text-white');
            if(tab === 'calendar') renderCalendar();
        }

        function render() {
            const dayData = state.history[today] || [];
            const totals = dayData.reduce((acc, curr) => ({
                k: acc.k + curr.kcal, p: acc.p + curr.p, c: acc.c + curr.c, f: acc.f + curr.f, fi: acc.fi + curr.fi
            }), {k:0, p:0, c:0, f:0, fi:0});

            // Update Stats
            document.getElementById('stat-kcal').innerText = totals.k;
            document.getElementById('stat-p').innerText = totals.p;
            document.getElementById('stat-c').innerText = totals.c;
            document.getElementById('stat-f').innerText = totals.f;
            document.getElementById('stat-fi').innerText = totals.fi;
            document.getElementById('target-display').innerText = state.goals.kcal;
            document.getElementById('kcal-target-input').value = state.goals.kcal;
            
            const perc = Math.min((totals.k / state.goals.kcal) * 100, 100);
            document.getElementById('kcal-progress').style.width = perc + "%";

            // Render Meals
            const container = document.getElementById('meals-container');
            container.innerHTML = dayData.map(m => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center animate-in slide-in-from-bottom-2">
                    <div>
                        <div class="text-[10px] text-indigo-400 font-bold uppercase mb-1">${m.time}</div>
                        <div class="font-bold text-sm text-white">${m.name}</div>
                        <div class="text-[10px] text-slate-500 mt-1">P: ${m.p}g · C: ${m.c}g · F: ${m.f}g</div>
                    </div>
                    <div class="text-right flex items-center gap-4">
                        <div class="font-syne text-lg">${m.kcal}</div>
                        <button onclick="deleteMeal(${m.id})" class="text-slate-700 hover:text-red-500 transition">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const now = new Date();
            document.getElementById('cal-month-title').innerText = now.toLocaleDateString('it-IT', {month:'long', year:'numeric'});
            
            grid.innerHTML = "";
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            
            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasData = state.history[dStr] && state.history[dStr].length > 0;
                grid.innerHTML += `
                    <div class="cal-day ${hasData ? 'has-data' : 'text-slate-700'}">
                        ${i}
                        ${hasData ? '<div class="w-1 h-1 bg-indigo-500 rounded-full mt-1"></div>' : ''}
                    </div>
                `;
            }
        }

        function exportCSV() {
            let csv = "Data,Pasto,Kcal,Proteine,Carbi,Grassi\n";
            Object.keys(state.history).forEach(date => {
                state.history[date].forEach(m => {
                    csv += `${date},${m.name},${m.kcal},${m.p},${m.c},${m.f}\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'calotot_export.csv');
            a.click();
        }

        // Init
        document.getElementById('display-date').innerText = new Date().toLocaleDateString('it-IT', {weekday: 'short', day: 'numeric', month: 'short'}).toUpperCase();
        render();
    </script>
</body>
</html>
