<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaloTot - Food Journal AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 1); }
        .calendar-day { min-height: 80px; transition: all 0.2s; }
        .calendar-day:hover { background-color: #f1f5f9; }
    </style>
</head>
<body class="pb-10">

    <!-- Header -->
    <nav class="bg-indigo-600 text-white p-4 shadow-lg mb-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">CaloTot</h1>
            <div class="space-x-4">
                <button onclick="switchTab('journal')" class="hover:text-indigo-200">Journal</button>
                <button onclick="switchTab('calendar')" class="hover:text-indigo-200">Calendario</button>
                <button onclick="switchTab('settings')" class="hover:text-indigo-200">Settings</button>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4 max-w-4xl">
        
        <!-- SEZIONE JOURNAL -->
        <div id="tab-journal" class="tab-content">
            <div class="glass-card rounded-2xl p-6 shadow-sm mb-6">
                <h2 class="text-xl font-semibold mb-4">Cosa hai mangiato oggi?</h2>
                <div class="flex flex-col gap-3">
                    <textarea id="meal-input" placeholder="Esempio: 80g pasta al pomodoro, 150g petto di pollo e un'insalata..." class="w-full p-3 border rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none h-24"></textarea>
                    <button onclick="addMeal()" class="bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition">
                        Analizza e Aggiungi con AI
                    </button>
                    <p class="text-xs text-gray-500">* Simulazione AI: Calcola istantaneamente calorie e macro basandosi su database nutrizionali.</p>
                </div>
            </div>

            <!-- Progressi Giornalieri -->
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6" id="daily-stats">
                <!-- Caricato via JS -->
            </div>

            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <h3 class="font-bold mb-4">Pasti di oggi</h3>
                <div id="meals-list" class="space-y-3">
                    <!-- Caricato via JS -->
                </div>
            </div>
        </div>

        <!-- SEZIONE CALENDARIO -->
        <div id="tab-calendar" class="tab-content hidden">
            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="calendar-month" class="text-xl font-bold">Mese</h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-2 border rounded-lg hover:bg-gray-100">&larr;</button>
                        <button onclick="changeMonth(1)" class="p-2 border rounded-lg hover:bg-gray-100">&rarr;</button>
                    </div>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center font-bold text-gray-500 text-xs mb-2">
                    <div>LUN</div><div>MAR</div><div>MER</div><div>GIO</div><div>VEN</div><div>SAB</div><div>DOM</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1">
                    <!-- Caricato via JS -->
                </div>
            </div>
        </div>

        <!-- SEZIONE SETTINGS -->
        <div id="tab-settings" class="tab-content hidden">
            <div class="glass-card rounded-2xl p-6 shadow-sm mb-6">
                <h2 class="text-xl font-semibold mb-4">Impostazioni Obiettivi</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Calorie Giornaliere Target</label>
                        <input type="number" id="target-calories" value="1600" onchange="updateSettings()" class="mt-1 block w-full p-2 border rounded-md">
                    </div>
                    <div class="grid grid-cols-2 gap-4 text-sm text-gray-500">
                        <p>Proteine: <span id="set-p"></span>g</p>
                        <p>Carboidrati: <span id="set-c"></span>g</p>
                        <p>Grassi: <span id="set-f"></span>g</p>
                        <p>Fibre: <span id="set-fi"></span>g</p>
                    </div>
                </div>
            </div>

            <div class="glass-card rounded-2xl p-6 shadow-sm">
                <h2 class="text-xl font-semibold mb-4">Gestione Dati</h2>
                <button onclick="exportData()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Esporta in JSON</button>
                <button onclick="clearAllData()" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg hover:bg-red-200 ml-2">Reset Totale</button>
            </div>
        </div>
    </div>

    <script>
        // Stato dell'app
        let data = JSON.parse(localStorage.getItem('calotot_data')) || {};
        let settings = JSON.parse(localStorage.getItem('calotot_settings')) || { calories: 1600 };
        let currentDate = new Date().toISOString().split('T')[0];
        let calendarViewDate = new Date();

        // Macronutrienti automatici (Ripartizione standard: 30% P, 40% C, 30% G)
        function calculateMacros(totalCals) {
            return {
                p: Math.round((totalCals * 0.30) / 4),
                c: Math.round((totalCals * 0.40) / 4),
                f: Math.round((totalCals * 0.30) / 9),
                fi: Math.round((totalCals / 1000) * 14) // 14g fibre ogni 1000kcal
            };
        }

        function updateSettings() {
            settings.calories = parseInt(document.getElementById('target-calories').value);
            localStorage.setItem('calotot_settings', JSON.stringify(settings));
            renderDailyStats();
            renderSettings();
        }

        function renderSettings() {
            const m = calculateMacros(settings.calories);
            document.getElementById('set-p').innerText = m.p;
            document.getElementById('set-c').innerText = m.c;
            document.getElementById('set-f').innerText = m.f;
            document.getElementById('set-fi').innerText = m.fi;
        }

        // Navigazione
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            if(tab === 'calendar') renderCalendar();
        }

        // Funzione "AI" Simulata (In una vera app, qui chiameresti un'API di OpenAI)
        function simulateAIAnalysis(text) {
            // Estrazione fittizia di dati per scopi dimostrativi
            const length = text.length;
            return {
                name: text.substring(0, 30) + (length > 30 ? '...' : ''),
                cal: Math.floor(Math.random() * 400) + 100,
                p: Math.floor(Math.random() * 20) + 5,
                c: Math.floor(Math.random() * 40) + 10,
                f: Math.floor(Math.random() * 15) + 2,
                fi: Math.floor(Math.random() * 8) + 1
            };
        }

        function addMeal() {
            const input = document.getElementById('meal-input');
            if (!input.value) return;

            const analysis = simulateAIAnalysis(input.value);
            
            if (!data[currentDate]) data[currentDate] = [];
            data[currentDate].push({
                ...analysis,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });

            localStorage.setItem('calotot_data', JSON.stringify(data));
            input.value = '';
            renderDailyStats();
            renderMeals();
        }

        function renderDailyStats() {
            const todayMeals = data[currentDate] || [];
            const totals = todayMeals.reduce((acc, curr) => ({
                cal: acc.cal + curr.cal,
                p: acc.p + curr.p,
                c: acc.c + curr.c,
                f: acc.f + curr.f,
                fi: acc.fi + curr.fi
            }), { cal: 0, p: 0, c: 0, f: 0, fi: 0 });

            const targetMacros = calculateMacros(settings.calories);
            
            const stats = [
                { label: 'Calorie', val: totals.cal, target: settings.calories, unit: 'kcal', color: 'indigo' },
                { label: 'Proteine', val: totals.p, target: targetMacros.p, unit: 'g', color: 'red' },
                { label: 'Carbo', val: totals.c, target: targetMacros.c, unit: 'g', color: 'amber' },
                { label: 'Grassi', val: totals.f, target: targetMacros.f, unit: 'g', color: 'blue' },
                { label: 'Fibre', val: totals.fi, target: targetMacros.fi, unit: 'g', color: 'green' }
            ];

            document.getElementById('daily-stats').innerHTML = stats.map(s => `
                <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                    <p class="text-[10px] uppercase font-bold text-gray-400">${s.label}</p>
                    <p class="text-lg font-bold text-${s.color}-600">${s.val}<span class="text-xs text-gray-400">/${s.target}</span></p>
                    <div class="w-full bg-gray-100 h-1 rounded-full mt-1">
                        <div class="bg-${s.color}-500 h-1 rounded-full" style="width: ${Math.min((s.val/s.target)*100, 100)}%"></div>
                    </div>
                </div>
            `).join('');
        }

        function renderMeals() {
            const todayMeals = data[currentDate] || [];
            document.getElementById('meals-list').innerHTML = todayMeals.map((m, index) => `
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg">
                    <div>
                        <p class="font-medium text-gray-800">${m.name}</p>
                        <p class="text-xs text-gray-500">${m.time} • P: ${m.p}g C: ${m.c}g F: ${m.f}g Fib: ${m.fi}g</p>
                    </div>
                    <div class="text-right">
                        <span class="font-bold text-indigo-600">${m.cal} kcal</span>
                        <button onclick="deleteMeal(${index})" class="block text-[10px] text-red-400 hover:text-red-600">Elimina</button>
                    </div>
                </div>
            `).join('');
        }

        function deleteMeal(index) {
            data[currentDate].splice(index, 1);
            localStorage.setItem('calotot_data', JSON.stringify(data));
            renderDailyStats();
            renderMeals();
        }

        // Calendario
        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthLabel = document.getElementById('calendar-month');
            grid.innerHTML = '';

            const year = calendarViewDate.getFullYear();
            const month = calendarViewDate.getMonth();
            
            monthLabel.innerText = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(calendarViewDate);

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Offset per lunedì (JS getDay è 0 per domenica)
            const offset = firstDay === 0 ? 6 : firstDay - 1;

            for (let i = 0; i < offset; i++) {
                grid.innerHTML += `<div class="p-2"></div>`;
            }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const dayData = data[dateStr] || [];
                const dayCals = dayData.reduce((acc, curr) => acc + curr.cal, 0);
                const isOver = dayCals > settings.calories;

                grid.innerHTML += `
                    <div class="calendar-day border rounded-lg p-1 text-left bg-white">
                        <span class="text-xs font-bold ${dateStr === currentDate ? 'text-indigo-600' : 'text-gray-400'}">${d}</span>
                        ${dayCals > 0 ? `
                            <div class="mt-1">
                                <div class="text-[10px] font-bold ${isOver ? 'text-red-500' : 'text-green-500'}">${dayCals} kcal</div>
                                <div class="w-full bg-gray-100 h-1 rounded-full overflow-hidden">
                                    <div class="h-full ${isOver ? 'bg-red-400' : 'bg-green-400'}" style="width: ${Math.min((dayCals/settings.calories)*100, 100)}%"></div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
        }

        function changeMonth(dir) {
            calendarViewDate.setMonth(calendarViewDate.getMonth() + dir);
            renderCalendar();
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `calotot-export-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function clearAllData() {
            if(confirm('Sei sicuro di voler cancellare tutti i dati?')) {
                localStorage.clear();
                location.reload();
            }
        }

        // Init
        renderSettings();
        renderDailyStats();
        renderMeals();
    </script>
</body>
</html>
