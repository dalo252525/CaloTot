<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#070d1a"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
    <title>CaloTot</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #070d1a;
            --bg-card: #0f172a;
            --bg-subcard: #1e293b;
            --border-color: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            --color-kcal: #60a5fa;
            --color-p: #f87171;
            --color-c: #fbbf24;
            --color-g: #c084fc;
            --color-f: #34d399;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-bottom: 90px;
            min-height: 100vh;
        }

        /* Container & Grid Layout */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Header e Brand */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            margin-bottom: 12px;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Cards */
        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        /* Macro pillole e indicatori */
        .grid-macros {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .macro-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 4px;
            text-align: center;
        }

        .macro-title {
            font-size: 9px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .macro-value {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
        }

        .macro-bar-bg {
            background: #1e293b;
            height: 4px;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .macro-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        /* Sezione Data e Navigazione */
        .date-navigator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            color: var(--text-main);
            background: var(--bg-subcard);
        }

        .current-date-lbl {
            font-weight: 600;
            font-size: 14px;
        }

        /* Form di inserimento */
        .ai-input-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .meal-select {
            background: var(--bg-subcard);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            width: 100%;
            cursor: pointer;
        }

        .text-input-styled {
            background: var(--bg-subcard);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            outline: none;
            resize: none;
            height: 70px;
            transition: border-color 0.2s;
        }

        .text-input-styled:focus {
            border-color: var(--color-kcal);
        }

        .btn-submit {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-submit:active {
            opacity: 0.85;
        }

        /* Lista Pasti Raggruppati */
        .meal-group-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin: 16px 0 8px 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .meal-item {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .meal-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
        }

        .meal-macros-summary {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .meal-right {
            text-align: right;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .meal-kcal {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 13px;
            color: var(--color-kcal);
        }

        .btn-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 14px;
            padding: 4px;
        }

        /* Sezione Calendario */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .calendar-grid-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day-box {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            aspect-ratio: 1;
            border-radius: 8px;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            position: relative;
        }

        .calendar-day-box:hover {
            border-color: var(--text-muted);
        }

        .calendar-day-num {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .calendar-day-num.today {
            color: var(--color-kcal);
            font-weight: 800;
        }

        .calendar-day-kcal {
            font-size: 8px;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
        }

        .calendar-day-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            margin: 0 auto;
        }

        /* Settings */
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .settings-label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-main);
        }

        .input-number-styled {
            background: var(--bg-subcard);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 8px;
            width: 100px;
            text-align: right;
            outline: none;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        /* Barra di Navigazione in basso (Bottom Bar) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 1000;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            gap: 4px;
            width: 33%;
        }

        .tab-btn.active {
            color: var(--color-kcal);
        }

        .tab-btn span.icon {
            font-size: 18px;
        }

        /* Utility classes */
        .hidden { display: none !important; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="toast" class="toast">Notifica</div>

    <div class="container">
        
        <header>
            <div class="brand">CaloTot</div>
            <div style="font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px;">DIARIO NUTRIZIONALE</div>
        </header>

        <div id="tab-journal" class="tab-view">
            
            <div class="date-navigator">
                <button class="nav-btn" onclick="adjustDay(-1)">&larr;</button>
                <div class="current-date-lbl" id="current-date-display">...</div>
                <button class="nav-btn" onclick="adjustDay(1)">&rarr;</button>
            </div>

            <div class="grid-macros" id="progress-macros-container">
                </div>

            <div class="card">
                <div class="ai-input-area">
                    <div style="display: flex; gap: 8px;">
                        <select id="meal-type-select" class="meal-select" style="flex: 2;">
                            <option value="Colazione">☀️ Colazione</option>
                            <option value="Spuntino">🍎 Spuntino</option>
                            <option value="Pranzo">🍽️ Pranzo</option>
                            <option value="Merenda">🫐 Merenda</option>
                            <option value="Cena">🌙 Cena</option>
                        </select>
                    </div>
                    <textarea id="ai-textarea" class="text-input-styled" placeholder="Scrivi cosa hai mangiato (es. 80g pasta, tonno, cucchiaio olio...)"></textarea>
                    <button class="btn-submit" onclick="processAIInput()">Analizza con AI & Aggiungi</button>
                </div>
            </div>

            <div id="meals-day-list">
                </div>

        </div>

        <div id="tab-calendar" class="tab-view hidden">
            <div class="card">
                <div class="calendar-header">
                    <button class="nav-btn" onclick="adjustCalendarMonth(-1)">&larr;</button>
                    <div class="current-date-lbl" id="calendar-month-display" style="text-transform: capitalize;">...</div>
                    <button class="nav-btn" onclick="adjustCalendarMonth(1)">&rarr;</button>
                </div>

                <div class="calendar-grid-days">
                    <div>Lu</div><div>Ma</div><div>Me</div><div>Gi</div><div>Ve</div><div>Sa</div><div>Do</div>
                </div>

                <div class="calendar-grid" id="calendar-grid-days-container">
                    </div>
            </div>
        </div>

        <div id="tab-settings" class="tab-view hidden">
            <div class="card">
                <h3 style="font-family: 'Syne', sans-serif; margin-bottom: 14px; font-size: 16px;">Target Calorico</h3>
                <div class="settings-row">
                    <span class="settings-label">Calorie Giornaliere (Kcal)</span>
                    <input type="number" id="settings-kcal-input" class="input-number-styled" value="1600" onchange="onSettingsChange()">
                </div>
                
                <div style="background: rgba(7, 13, 26, 0.5); padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); margin-top: 10px;">
                    <div style="font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; font-weight: 600;">Macro calcolati in automatico</div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; text-align: center;">
                        <div>
                            <div style="font-size: 14px; font-weight: 800; color: var(--color-p);" id="calc-p">0g</div>
                            <div style="font-size: 9px; color: var(--text-muted)">Prot</div>
                        </div>
                        <div>
                            <div style="font-size: 14px; font-weight: 800; color: var(--color-c);" id="calc-c">0g</div>
                            <div style="font-size: 9px; color: var(--text-muted)">Carb</div>
                        </div>
                        <div>
                            <div style="font-size: 14px; font-weight: 800; color: var(--color-g);" id="calc-g">0g</div>
                            <div style="font-size: 9px; color: var(--text-muted)">Gras</div>
                        </div>
                        <div>
                            <div style="font-size: 14px; font-weight: 800; color: var(--color-f);" id="calc-f">0g</div>
                            <div style="font-size: 9px; color: var(--text-muted)">Fibr</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3 style="font-family: 'Syne', sans-serif; margin-bottom: 14px; font-size: 16px;">Dati & Backup</h3>
                <button class="btn-submit" style="width: 100%; margin-bottom: 8px; background: linear-gradient(135deg, #059669, #10b981);" onclick="exportDataCSV()">Esporta Diario (CSV)</button>
                <button class="btn-danger" onclick="clearData()">Inizializza Database</button>
            </div>
        </div>

    </div>

    <div class="bottom-nav">
        <button class="tab-btn active" onclick="switchView('journal', this)">
            <span class="icon">🍽️</span>
            <span>Diario</span>
        </button>
        <button class="tab-btn" onclick="switchView('calendar', this)">
            <span class="icon">📅</span>
            <span>Calendario</span>
        </button>
        <button class="tab-btn" onclick="switchView('settings', this)">
            <span class="icon">⚙️</span>
            <span>Opzioni</span>
        </button>
    </div>

    <script>
        // --- DATA STORE ---
        let state = {
            date: new Date().toISOString().split("T")[0],
            calendarViewDate: new Date(),
            goals: { kcal: 1600, protein: 112, carbs: 172, fat: 52, fiber: 35 },
            days: {}
        };

        const MEALS = ["Colazione", "Spuntino", "Pranzo", "Merenda", "Cena"];
        const ICONS = { Colazione: "☀️", Spuntino: "🍎", Pranzo: "🍽️", Merenda: "🫐", Cena: "🌙" };

        // --- SISTEMA DI SALVATAGGIO IN LOCAL STORAGE ---
        function loadState() {
            const savedDays = localStorage.getItem("calotot_days");
            const savedGoals = localStorage.getItem("calotot_goals");
            if (savedDays) state.days = JSON.parse(savedDays);
            if (savedGoals) {
                state.goals = JSON.parse(savedGoals);
            } else {
                state.goals = calcMacrosFromKcal(1600);
            }
        }

        function saveState() {
            localStorage.setItem("calotot_days", JSON.stringify(state.days));
            localStorage.setItem("calotot_goals", JSON.stringify(state.goals));
        }

        // --- CALCOLO AUTOMATICO MACRONUTRIENTI ---
        function calcMacrosFromKcal(kcal) {
            return {
                kcal: kcal,
                protein: Math.round(kcal * 0.28 / 4),  // 28% Prot
                carbs: Math.round(kcal * 0.43 / 4),    // 43% Carb
                fat: Math.round(kcal * 0.29 / 9),      // 29% Gras
                fiber: Math.round(kcal / 1000 * 22)    // ~22g per 1000kcal
            };
        }

        // --- SIMULATORE AI DI NUTRIZIONALE ---
        function mockAIAnalysis(text, mealType) {
            const textLower = text.toLowerCase();
            let parsed = { name: text, kcal: 150, protein: 10, carbs: 15, fat: 5, fiber: 2 };

            // Calcoli basati su parole chiave comuni per una simulazione AI plausibile
            if (textLower.includes("pasta") || textLower.includes("riso")) {
                parsed.kcal = 350; parsed.protein = 10; parsed.carbs = 70; parsed.fat = 2; parsed.fiber = 3;
            } else if (textLower.includes("pollo") || textLower.includes("tacchino") || textLower.includes("carne")) {
                parsed.kcal = 180; parsed.protein = 30; parsed.carbs = 0; parsed.fat = 6; parsed.fiber = 0;
            } else if (textLower.includes("tonno") || textLower.includes("pesce") || textLower.includes("salmone")) {
                parsed.kcal = 200; parsed.protein = 25; parsed.carbs = 0; parsed.fat = 10; parsed.fiber = 0;
            } else if (textLower.includes("mela") || textLower.includes("banana") || textLower.includes("frutta")) {
                parsed.kcal = 80; parsed.protein = 1; parsed.carbs = 20; parsed.fat = 0; parsed.fiber = 3;
            } else if (textLower.includes("uova") || textLower.includes("uovo")) {
                parsed.kcal = 155; parsed.protein = 13; parsed.carbs = 1; parsed.fat = 11; parsed.fiber = 0;
            } else if (textLower.includes("pane") || textLower.includes("fetta")) {
                parsed.kcal = 250; parsed.protein = 8; parsed.carbs = 50; parsed.fat = 3; parsed.fiber = 4;
            } else if (textLower.includes("olio")) {
                parsed.kcal = 90; parsed.protein = 0; parsed.carbs = 0; parsed.fat = 10; parsed.fiber = 0;
            }

            // Variazione e aggiunta del pasto effettivo scritto
            parsed.name = text.length > 40 ? text.substring(0, 37) + "..." : text;
            return parsed;
        }

        // --- UTILITY GRAPHICS & UTILS ---
        function toast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 2000);
        }

        function formatDisplayDate(dateStr) {
            const date = new Date(dateStr + 'T12:00:00');
            return date.toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function getDayTotals(dateStr) {
            const dayData = state.days[dateStr];
            const totals = { kcal: 0, protein: 0, carbs: 0, fat: 0, fiber: 0 };
            if (!dayData || !dayData.meals) return totals;

            Object.values(dayData.meals).flat().forEach(item => {
                totals.kcal += item.kcal || 0;
                totals.protein += item.protein || 0;
                totals.carbs += item.carbs || 0;
                totals.fat += item.fat || 0;
                totals.fiber += item.fiber || 0;
            });
            return totals;
        }

        // --- NAVIGATION ---
        function switchView(viewName, button) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(`tab-${viewName}`).classList.remove('hidden');

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (button) button.classList.add('active');

            if (viewName === 'calendar') renderCalendar();
        }

        function adjustDay(dir) {
            const dt = new Date(state.date + 'T12:00:00');
            dt.setDate(dt.getDate() + dir);
            state.date = dt.toISOString().split('T')[0];
            renderAll();
        }

        // --- RENDERING JOURNAL ---
        function renderAll() {
            loadState();
            
            // Imposta testo della data corrente
            document.getElementById("current-date-display").innerText = formatDisplayDate(state.date);

            // Calcola totali odierni
            const totals = getDayTotals(state.date);
            const goals = state.goals;

            // Render dei Macro-box con barra di avanzamento
            const macrosDef = [
                { label: 'Calorie', val: totals.kcal, target: goals.kcal, unit: 'kcal', color: 'var(--color-kcal)' },
                { label: 'Proteine', val: totals.protein, target: goals.protein, unit: 'g', color: 'var(--color-p)' },
                { label: 'Carbo', val: totals.carbs, target: goals.carbs, unit: 'g', color: 'var(--color-c)' },
                { label: 'Grassi', val: totals.fat, target: goals.fat, unit: 'g', color: 'var(--color-g)' },
                { label: 'Fibre', val: totals.fiber, target: goals.fiber, unit: 'g', color: 'var(--color-f)' }
            ];

            const container = document.getElementById("progress-macros-container");
            container.innerHTML = macrosDef.map(m => {
                const percent = Math.min((m.val / m.target) * 100, 100);
                return `
                    <div class="macro-box">
                        <div class="macro-title">${m.label}</div>
                        <div class="macro-value" style="color: ${m.color}">${m.val}<span style="font-size: 9px; font-weight:400; color: var(--text-muted);">/${m.target}${m.unit}</span></div>
                        <div class="macro-bar-bg">
                            <div class="macro-bar-fill" style="width: ${percent}%; background-color: ${m.color};"></div>
                        </div>
                    </div>
                `;
            }).join('');

            // Mostra Lista Pasti del giorno
            const listContainer = document.getElementById("meals-day-list");
            listContainer.innerHTML = "";

            const dayData = state.days[state.date] || { meals: {} };
            
            MEALS.forEach(mealKey => {
                const items = dayData.meals[mealKey] || [];
                if (items.length > 0 || MEALS.indexOf(mealKey) > -1) {
                    // Crea intestazione pasto
                    const mealHeader = document.createElement("div");
                    mealHeader.className = "meal-group-title";
                    mealHeader.innerHTML = `<span>${ICONS[mealKey]}</span> <span>${mealKey}</span>`;
                    listContainer.appendChild(mealHeader);

                    if (items.length === 0) {
                        const emptyElement = document.createElement("div");
                        emptyElement.style = "padding: 8px 12px; font-size: 11px; color: var(--text-muted); font-style: italic;";
                        emptyElement.innerText = "Nessun alimento inserito";
                        listContainer.appendChild(emptyElement);
                    } else {
                        items.forEach((item, index) => {
                            const row = document.createElement("div");
                            row.className = "meal-item";
                            row.innerHTML = `
                                <div>
                                    <div class="meal-name">${item.name}</div>
                                    <div class="meal-macros-summary">P: ${item.protein}g | C: ${item.carbs}g | G: ${item.fat}g | F: ${item.fiber}g</div>
                                </div>
                                <div class="meal-right">
                                    <div class="meal-kcal">${item.kcal} kcal</div>
                                    <button class="btn-delete" onclick="removeItem('${mealKey}', ${index})">✕</button>
                                </div>
                            `;
                            listContainer.appendChild(row);
                        });
                    }
                }
            });

            // Sincronizza UI Settings
            document.getElementById("settings-kcal-input").value = state.goals.kcal;
            document.getElementById("calc-p").innerText = state.goals.protein + "g";
            document.getElementById("calc-c").innerText = state.goals.carbs + "g";
            document.getElementById("calc-g").innerText = state.goals.fat + "g";
            document.getElementById("calc-f").innerText = state.goals.fiber + "g";
        }

        // --- AGGIUNTA E RIMOZIONE PASTI ---
        function processAIInput() {
            const textEl = document.getElementById("ai-textarea");
            const text = textEl.value.trim();
            if (!text) {
                toast("Inserisci del testo prima!");
                return;
            }

            const mealType = document.getElementById("meal-type-select").value;
            const analyzedItem = mockAIAnalysis(text, mealType);

            if (!state.days[state.date]) {
                state.days[state.date] = { meals: {} };
            }
            if (!state.days[state.date].meals[mealType]) {
                state.days[state.date].meals[mealType] = [];
            }

            state.days[state.date].meals[mealType].push(analyzedItem);
            saveState();
            textEl.value = "";
            toast("Pasto aggiunto con successo!");
            renderAll();
        }

        function removeItem(mealKey, index) {
            if (state.days[state.date] && state.days[state.date].meals[mealKey]) {
                state.days[state.date].meals[mealKey].splice(index, 1);
                saveState();
                toast("Alimento rimosso");
                renderAll();
            }
        }

        // --- SISTEMA CALENDARIO ---
        function adjustCalendarMonth(dir) {
            state.calendarViewDate.setMonth(state.calendarViewDate.getMonth() + dir);
            renderCalendar();
        }

        function renderCalendar() {
            const container = document.getElementById("calendar-grid-days-container");
            const label = document.getElementById("calendar-month-display");
            container.innerHTML = "";

            const yr = state.calendarViewDate.getFullYear();
            const mo = state.calendarViewDate.getMonth();

            label.innerText = state.calendarViewDate.toLocaleDateString("it-IT", { month: "long", year: "numeric" });

            // Primo giorno del mese
            const firstDayIndex = new Date(yr, mo, 1).getDay(); // Dom=0, Lun=1...
            const offset = firstDayIndex === 0 ? 6 : firstDayIndex - 1; // Allinea a Lunedì
            
            // Giorni totali nel mese
            const totalDaysInMonth = new Date(yr, mo + 1, 0).getDate();

            // Riempi offset vuoti
            for (let i = 0; i < offset; i++) {
                const empty = document.createElement("div");
                container.appendChild(empty);
            }

            // Genera i giorni
            const todayStr = new Date().toISOString().split("T")[0];
            for (let day = 1; day <= totalDaysInMonth; day++) {
                const dayDateStr = `${yr}-${String(mo + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const totals = getDayTotals(dayDateStr);

                const dayBox = document.createElement("div");
                dayBox.className = "calendar-day-box";
                dayBox.onclick = () => {
                    state.date = dayDateStr;
                    renderAll();
                    switchView('journal');
                };

                const isToday = dayDateStr === todayStr;
                const percent = Math.min((totals.kcal / state.goals.kcal) * 100, 100);

                let calorieIndicator = "";
                let indicatorColor = "#334155";
                if (totals.kcal > 0) {
                    const overLimit = totals.kcal > state.goals.kcal;
                    indicatorColor = overLimit ? "#ef4444" : "#10b981";
                    calorieIndicator = `<div class="calendar-day-kcal" style="color: ${indicatorColor}">${totals.kcal}</div>`;
                }

                dayBox.innerHTML = `
                    <div class="calendar-day-num ${isToday ? 'today' : ''}">${day}</div>
                    ${calorieIndicator}
                    ${totals.kcal > 0 ? `<div class="calendar-day-dot" style="background-color: ${indicatorColor}"></div>` : ''}
                `;
                container.appendChild(dayBox);
            }
        }

        // --- IMPOSTAZIONI ---
        function onSettingsChange() {
            const kcalVal = parseInt(document.getElementById("settings-kcal-input").value) || 1600;
            state.goals = calcMacrosFromKcal(kcalVal);
            saveState();
            renderAll();
        }

        function clearData() {
            if (confirm("Sei sicuro di voler resettare tutti i dati del diario? L'operazione non è reversibile.")) {
                state.days = {};
                state.goals = calcMacrosFromKcal(1600);
                saveState();
                renderAll();
                toast("Database formattato");
            }
        }

        // --- ESPORTAZIONE DATI IN FORMATO CSV ---
        function exportDataCSV() {
            let csvRows = [["Data", "Pasto", "Alimento", "Kcal", "Proteine(g)", "Carboidrati(g)", "Grassi(g)", "Fibre(g)"]];
            
            Object.keys(state.days).sort().forEach(date => {
                const mealsObj = state.days[date].meals || {};
                Object.keys(mealsObj).forEach(mealType => {
                    mealsObj[mealType].forEach(item => {
                        csvRows.push([
                            date,
                            mealType,
                            item.name.replace(/"/g, '""'),
                            item.kcal,
                            item.protein,
                            item.carbs,
                            item.fat,
                            item.fiber
                        ]);
                    });
                });
            });

            const csvString = csvRows.map(row => row.map(v => `"${v}"`).join(",")).join("\n");
            const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvString], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.href = url;
            link.download = `calotot_export_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            URL.revokeObjectURL(url);
            toast("Esportazione CSV completata!");
        }

        // --- INITIALIZE APP ---
        loadState();
        renderAll();
    </script>
</body>
</html>
